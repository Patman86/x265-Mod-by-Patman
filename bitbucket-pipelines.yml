    - step: &summary-report
        name: "Pipeline Summary Report"
        script:
          - echo ""
          - echo "================================================================"
          - echo "       x265 PIPELINE - COMBINED ENCODING SUMMARY REPORT"
          - echo "================================================================"
          - |
            total_encodes=0
            for f in summaries/*.log; do
              [ -f "$f" ] || continue
              step_name=$(basename "$f" .log)
              count=$(grep -c "encoded" "$f" 2>/dev/null || echo 0)
              total_encodes=$((total_encodes + count))
              echo ""
              echo "----------------------------------------------------------------"
              printf " [%s] (%d encodes)\n" "$step_name" "$count"
              echo "----------------------------------------------------------------"
              echo "  TEST                                          | FRAMES  FPS       BITRATE     QP"
              echo "  ----------------------------------------------|--------------------------------------"
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "$line"
                fi
              done < "$f"
            done
          - echo ""
          - echo "================================================================"
          - |
            total_encodes=0
            total_fps=0
            fps_count=0
            for f in summaries/*.log; do
              [ -f "$f" ] || continue
              while IFS= read -r line; do
                fps=$(echo "$line" | grep -oP '\([\d.]+\s+fps\)' | grep -oP '[\d.]+' | head -1)
                if [ -n "$fps" ]; then
                  total_encodes=$((total_encodes + 1))
                  total_fps=$(echo "$total_fps + $fps" | bc 2>/dev/null || echo "$total_fps")
                  fps_count=$((fps_count + 1))
                fi
              done < "$f"
            done
            if [ $fps_count -gt 0 ]; then
              avg_fps=$(echo "scale=2; $total_fps / $fps_count" | bc 2>/dev/null || echo "N/A")
              echo " TOTALS: $total_encodes encodes across $(ls summaries/*.log 2>/dev/null | wc -l) test suites"
              echo " AVERAGE FPS: $avg_fps (across all encodes)"
            else
              echo " No encoding summaries found."
            fi
          - echo "================================================================"

pipelines:
  default:
    - parallel:
        - step: *build-8bit
        - step: *build-10bit
        - step: *build-12bit
    - step: *build-multilib
    - parallel:
        - step: *test-cli-presets
        - step: *test-rate-control
        - step: *test-encoding-features
        - step: *test-analysis-save-load
        - step: *test-bitstream-validation
        - step: *test-threading
        - step: *test-quality-metrics
        - step: *test-realworld-video
        - step: *test-10bit-12bit-encoding
        - step: *test-mcstf-sbrc-interlace
    - step: *summary-report
